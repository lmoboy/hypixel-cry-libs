name: Auto-Update Library Registry

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

jobs:
  process-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout PR Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          fetch-depth: 0

      - name: Validate File Types
        id: validate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch base branch to compare
          git fetch origin ${{ github.base_ref }}
          
          # Get list of all changed files
          ALL_FILES=$(git diff --name-only --diff-filter=d origin/${{ github.base_ref }} HEAD)
          
          # Filter for Lua files only
          LUA_FILES=$(echo "$ALL_FILES" | grep '\.lua$' || true)
          
          # Count files using grep -c
          TOTAL_COUNT=$(echo "$ALL_FILES" | grep -v '^$' | wc -l)
          LUA_COUNT=$(echo "$LUA_FILES" | grep -v '^$' | wc -l)

          echo "Total files changed: $TOTAL_COUNT"
          echo "Lua files changed: $LUA_COUNT"

          if [ "$TOTAL_COUNT" -eq 0 ]; then
            echo "No files detected."
            exit 0
          fi

          if [ "$TOTAL_COUNT" -ne "$LUA_COUNT" ]; then
            echo "Non-Lua files detected. Closing PR."
            gh pr comment ${{ github.event.pull_request.number }} --body "❌ Pull Request rejected: This registry only accepts **.lua** files. Please remove other file types and try again."
            gh pr close ${{ github.event.pull_request.number }}
            exit 1
          fi
          
          echo "Validation passed. Only Lua files detected."

      - name: Install Luacheck & jq
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4 luarocks jq
          sudo luarocks install luacheck

      - name: Process Libraries and Update JSON
        run: |
          if [ ! -f "registry.json" ]; then
            echo "[]" > registry.json
          fi

          LUA_FILES=$(git diff --name-only origin/${{ github.base_ref }} HEAD | grep '\.lua$' || true)

          for FILE in $LUA_FILES; do
            if [ ! -f "$FILE" ]; then continue; fi
            
            FILE_MD5=$(md5sum "$FILE" | awk '{print $1}')
            FILE_NAME=$(basename "$FILE")
            FILE_VER=$(grep -oP '^--\s*@version\s+\K.*' "$FILE" || echo "alpha-0.1")
            FILE_LOC=$(grep -oP '^--\s*@location\s+\K.*' "$FILE" || echo "/libs/")

            echo "Updating registry for $FILE_NAME"

            jq --arg name "$FILE_NAME" \
               --arg md5 "$FILE_MD5" \
               --arg loc "$FILE_LOC" \
               --arg ver "$FILE_VER" \
               'map(select(.name != $name)) + [{name: $name, md5: $md5, location: $loc, ver: $ver}]' \
               registry.json > tmp.json && mv tmp.json registry.json
          done

      - name: Commit Updated Registry
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update registry for ${{ github.event.pull_request.title }}"
          file_pattern: "registry.json"
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com

      - name: Approve and Merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr review ${{ github.event.pull_request.number }} --approve
          gh pr merge ${{ github.event.pull_request.number }} --merge
